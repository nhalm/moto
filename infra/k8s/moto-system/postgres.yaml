---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: moto-system
  labels:
    app.kubernetes.io/part-of: moto
    app.kubernetes.io/component: postgres
data:
  init-keybox-db.sql: |
    CREATE DATABASE moto_keybox;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: moto-system
  labels:
    app.kubernetes.io/part-of: moto
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: moto-system
  labels:
    app.kubernetes.io/part-of: moto
    app.kubernetes.io/component: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: moto
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: moto
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: POSTGRES_DB
              value: moto_club
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - moto
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
