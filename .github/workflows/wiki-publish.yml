name: Publish Docs to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync docs to wiki
        run: |
          # Remove old wiki markdown (except .git)
          find wiki/ -name "*.md" -delete

          # Copy all docs to wiki root
          cp docs/*.md wiki/

          # If docs/README.md exists, also copy it as Home.md for wiki home page
          if [ -f docs/README.md ]; then
            cp docs/README.md wiki/Home.md
          fi

          echo "Wiki files synchronized:"
          ls -la wiki/ | grep -E "\.(md)$" | sort

      - name: Commit and push to wiki
        working-directory: wiki
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add .

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to wiki"
          else
            git commit -m "Update wiki from docs/ (${GITHUB_SHA::7})"
            git push origin master
          fi
