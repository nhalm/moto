name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: moto_test
          POSTGRES_PASSWORD: moto_test
          POSTGRES_DB: moto_test_club
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U moto_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Install cargo tools
        run: cargo install cargo-audit sqlx-cli --no-default-features --features postgres

      - name: Create keybox database
        run: PGPASSWORD=moto_test psql -h localhost -p 5433 -U moto_test -d moto_test_club -c "CREATE DATABASE moto_test_keybox;"

      - name: Run migrations
        run: make test-db-migrate

      - name: Run CI checks
        run: make test-ci

  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [garage, bike, club, keybox]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build ${{ matrix.image }} image
        run: make build-${{ matrix.image }}
