name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: moto_test
          POSTGRES_PASSWORD: moto_test
          POSTGRES_DB: moto_test_club
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U moto_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Install cargo tools
        run: |
          cargo install cargo-audit
          cargo install sqlx-cli --no-default-features --features postgres

      - name: Create keybox database
        run: PGPASSWORD=moto_test psql -h localhost -p 5433 -U moto_test -d moto_test_club -c "CREATE DATABASE moto_test_keybox;"

      - name: Run migrations
        run: make test-db-migrate

      - name: Run CI checks
        run: make test-ci

  build-bike:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-bike-${{ hashFiles('infra/docker/Dockerfile.bike') }}
          restore-keys: |
            ${{ runner.os }}-buildx-bike-

      - name: Build bike image
        run: |
          docker build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t moto-bike:latest \
            -f infra/docker/Dockerfile.bike \
            .
          # Move cache to prevent unbounded growth
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Save bike image as artifact
        run: |
          docker save moto-bike:latest -o /tmp/moto-bike.tar

      - name: Upload bike image artifact
        uses: actions/upload-artifact@v4
        with:
          name: moto-bike-image
          path: /tmp/moto-bike.tar
          retention-days: 1

  build-images:
    runs-on: ubuntu-latest
    needs: [build-bike]
    strategy:
      matrix:
        image: [garage, club, keybox]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Download bike image artifact
        if: matrix.image == 'club' || matrix.image == 'keybox'
        uses: actions/download-artifact@v4
        with:
          name: moto-bike-image
          path: /tmp

      - name: Start temporary local registry
        if: matrix.image == 'club' || matrix.image == 'keybox'
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
          docker load -i /tmp/moto-bike.tar
          docker tag moto-bike:latest localhost:5000/moto-bike:latest
          docker push localhost:5000/moto-bike:latest

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.image }}-${{ hashFiles(format('infra/docker/Dockerfile.{0}', matrix.image), 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.image }}-
            ${{ runner.os }}-buildx-

      - name: Build ${{ matrix.image }} image
        run: |
          # Set BIKE_IMAGE arg for club/keybox builds
          if [ "${{ matrix.image }}" = "club" ] || [ "${{ matrix.image }}" = "keybox" ]; then
            BIKE_ARG="--build-arg BIKE_IMAGE=localhost:5000/moto-bike:latest"
          else
            BIKE_ARG=""
          fi

          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t moto-${{ matrix.image }}:latest \
            -f infra/docker/Dockerfile.${{ matrix.image }} \
            --load \
            $BIKE_ARG \
            .
          # Move cache to prevent unbounded growth
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Stop temporary registry
        if: always() && (matrix.image == 'club' || matrix.image == 'keybox')
        run: |
          docker stop registry || true
          docker rm registry || true
