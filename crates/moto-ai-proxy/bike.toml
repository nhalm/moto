# bike.toml - Engine deployment configuration for moto-ai-proxy
# See specs/moto-bike.md for full specification

name = "ai-proxy"

[deploy]
replicas = 2
port = 8080

[health]
port = 8081
path = "/health/ready"

[resources]
cpu_request = "100m"
cpu_limit = "500m"
memory_request = "128Mi"
memory_limit = "256Mi"
