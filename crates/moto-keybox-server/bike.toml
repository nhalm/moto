# bike.toml - Engine deployment configuration for moto-keybox
# See specs/moto-bike.md for full specification

name = "keybox"

[deploy]
replicas = 3
port = 8080

[health]
port = 8081
path = "/health/ready"

[resources]
cpu_request = "250m"
cpu_limit = "1"
memory_request = "256Mi"
memory_limit = "1Gi"
